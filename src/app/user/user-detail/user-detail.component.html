<div class="detail-wrapper">
  <div class="detail-header">
    <svg viewBox="0 0 16 16" fill="currentColor" width="16" height="16" aria-hidden="true">
      <path d="M10.561 8.073a6.005 6.005 0 0 1 3.432 5.142.75.75 0 1 1-1.498.07 4.5 4.5 0 0 0-8.99 0 .75.75 0 0 1-1.498-.07 6.004 6.004 0 0 1 3.431-5.142 3.999 3.999 0 1 1 5.123 0ZM10.5 5a2.5 2.5 0 1 0-5 0 2.5 2.5 0 0 0 5 0Z"/>
    </svg>
    User Details
  </div>
  <div class="detail-card">
    <div class="detail-body">

      <!-- Avatar -->
      <div class="detail-avatar-wrap">
        <img [src]="user.avatarUrl" [alt]="user.name" class="detail-avatar"
             (error)="onImgError($event)"/>
      </div>

      <!-- Info -->
      <div class="detail-info">
        <div class="detail-name-row">
          <h2 class="detail-name">{{ user.name }}</h2>
          <span class="detail-sub">@{{ user.username }} · {{ user.role }}</span>
        </div>

        <hr class="detail-divider"/>

        <div class="detail-fields">
          <div class="detail-field">
            <span class="field-label">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
                <rect x="1.75" y="3.5" width="12.5" height="9" rx="1.5"/>
                <path d="m1.75 5.5 5.54 3.47a1.5 1.5 0 0 0 1.59 0L14.25 5.5"/>
              </svg>
              EMAIL
            </span>
            <span class="field-value">{{ user.email }}</span>
          </div>
          <div class="detail-field">
            <span class="field-label">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
                <path d="M8 1.5a5 5 0 1 1 0 10A5 5 0 0 1 8 1.5Zm0 2.5v2.25L9.5 8"/>
                <circle cx="8" cy="8" r="1"/>
              </svg>
              LOCATION
            </span>
            <span class="field-value">{{ user.location }}</span>
          </div>
          <div class="detail-field">
            <span class="field-label">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
                <rect x="1.5" y="3.5" width="13" height="9" rx="1.5"/>
                <path d="M5.5 3.5v9M1.5 7.5h4"/>
              </svg>
              ROLE
            </span>
            <span class="field-value">
              <span class="role-badge">{{ user.role }}</span>
            </span>
          </div>
          <div class="detail-field">
            <span class="field-label">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
                <rect x="2" y="2" width="12" height="12" rx="1.5"/>
                <path d="M6 2v12M2 6h4"/>
              </svg>
              REPOSITORIES
            </span>
            <span class="field-value">{{ user.repoIds.length }} active projects</span>
          </div>
        </div>

        <div class="detail-stats">
          <span class="stat-chip">
            <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14">
              <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm0 1a6 6 0 0 0-6 6h12a6 6 0 0 0-6-6Z"/>
            </svg>
            Member since 2024
          </span>
          <span class="stat-chip">
            <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14">
              <path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8V1.5Z"/>
            </svg>
            {{ user.repoIds.length }} Repositories
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
